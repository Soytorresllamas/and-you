<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>and-you · soundboard</title>
  <style>
    :root {
      --bg-1: #1b1233;
      --bg-2: #3a1d5c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% 0%, var(--bg-2), var(--bg-1) 70%);
      font-family: "Baloo 2", "Comic Sans MS", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 40px;
    }

    .board {
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 1100px;
    }

    /* Desktop: los 4 botones en una sola linea */
    @media (min-width: 760px) {
      .board {
        flex-wrap: nowrap;
        gap: clamp(20px, 3vw, 40px);
      }
    }

    /* Botón 3D brillante totalmente redondo */
    .btn {
      --c1: #ff6a6a;
      --c2: #d62828;
      position: relative;
      width: clamp(150px, 26vw, 220px);
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      color: #fff;
      font-family: inherit;
      background: linear-gradient(160deg, var(--c1) 0%, var(--c2) 100%);
      box-shadow:
        0 12px 0 0 color-mix(in srgb, var(--c2) 70%, #000),
        0 22px 30px -6px rgba(0,0,0,0.55),
        inset 0 4px 8px rgba(255,255,255,0.45);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
      overflow: hidden;
    }

    /* Brillo superior tipo burbuja */
    .btn::before {
      content: "";
      position: absolute;
      top: 9%;
      left: 16%;
      width: 68%;
      height: 34%;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0));
      pointer-events: none;
    }

    .btn:nth-child(2) { --c1: #ffd86b; --c2: #f4a300; color: #5a3b00; }
    .btn:nth-child(3) { --c1: #6bc5ff; --c2: #1f7ae0; }
    .btn:nth-child(4) { --c1: #ff9ed2; --c2: #e84d9c; }

    .btn:hover { transform: translateY(-3px); }

    .btn:active,
    .btn.pressed {
      transform: translateY(10px);
      box-shadow:
        0 2px 0 0 color-mix(in srgb, var(--c2) 70%, #000),
        0 6px 12px -4px rgba(0,0,0,0.55),
        inset 0 4px 8px rgba(255,255,255,0.35);
    }

    /* Estado: meme en loop (mantenido >2s) */
    .btn.looping {
      animation: pulse 1s ease-in-out infinite;
    }
    .btn.looping::after {
      content: "🔁";
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 1.4rem;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 12px 0 0 color-mix(in srgb, var(--c2) 70%, #000), 0 22px 30px -6px rgba(0,0,0,0.55), inset 0 4px 8px rgba(255,255,255,0.45), 0 0 0 0 rgba(255,255,255,0.5); }
      50%      { box-shadow: 0 12px 0 0 color-mix(in srgb, var(--c2) 70%, #000), 0 22px 30px -6px rgba(0,0,0,0.55), inset 0 4px 8px rgba(255,255,255,0.45), 0 0 28px 6px rgba(255,255,255,0.55); }
    }

    .btn .emoji {
      font-size: clamp(3rem, 9vw, 4.5rem);
      line-height: 1;
      filter: drop-shadow(0 3px 3px rgba(0,0,0,0.25));
    }

    .btn .label {
      font-size: clamp(1rem, 2.8vw, 1.4rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      text-shadow: 0 2px 2px rgba(0,0,0,0.25);
    }

    /* ----- Palancas de loop ----- */
    .switches {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
      align-items: flex-start;
    }

    .switch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #fff;
    }

    .switch .name {
      font-size: 1.05rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 2px 3px rgba(0,0,0,0.4);
    }

    .toggle {
      position: relative;
      width: 110px;
      height: 56px;
      border-radius: 999px;
      background: #2a2342;
      border: 3px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.55);
      cursor: pointer;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }

    .toggle .knob {
      position: absolute;
      top: 50%;
      left: 6px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: linear-gradient(160deg, #ffffff, #c9c9d4);
      box-shadow: 0 4px 8px rgba(0,0,0,0.5), inset 0 2px 3px rgba(255,255,255,0.8);
      transition: left 0.25s cubic-bezier(0.4, 1.6, 0.5, 1);
    }

    .toggle.on { background: linear-gradient(160deg, #38d97a, #19a85a); box-shadow: inset 0 2px 6px rgba(0,0,0,0.3), 0 0 22px rgba(56,217,122,0.7); }
    .toggle.on .knob { left: 56px; }

    .switch .state { font-size: 0.85rem; opacity: 0.65; letter-spacing: 1px; }

    /* ----- Controles de volumen ----- */
    .volumes {
      display: flex;
      flex-wrap: wrap;
      gap: 36px;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 720px;
      padding: 22px 26px;
      border-radius: 22px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .vol {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
      flex: 1 1 280px;
    }

    .vol .vlabel {
      font-size: 0.95rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .vol input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      outline: none;
      cursor: pointer;
    }
    .vol input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(160deg, #ffffff, #c9c9d4);
      box-shadow: 0 3px 6px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    .vol input[type="range"]::-moz-range-thumb {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(160deg, #ffffff, #c9c9d4);
      box-shadow: 0 3px 6px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    .vol .vval { font-size: 0.85rem; opacity: 0.7; width: 38px; text-align: right; }

    .hint {
      color: #fff;
      opacity: 0.5;
      font-size: 0.85rem;
      text-align: center;
      max-width: 460px;
    }
  </style>
</head>
<body>
  <div class="board">
    <button class="btn" data-sound="sounds/exselent.mp3">
      <span class="emoji">😎</span>
      <span class="label">Exselent</span>
    </button>

    <button class="btn" data-sound="sounds/and-you.mp3">
      <span class="emoji">👉</span>
      <span class="label">And You</span>
    </button>

    <button class="btn" data-sound="sounds/ooo-yes.mp3">
      <span class="emoji">🤤</span>
      <span class="label">Ooo Yes</span>
    </button>

    <button class="btn" data-sound="sounds/besito.mp3">
      <span class="emoji">😘</span>
      <span class="label">Besito</span>
    </button>
  </div>

  <div class="switches">
    <div class="switch">
      <span class="name">🥁 Bongo</span>
      <div class="toggle" data-loop="sounds/loop-bongo.mp3" role="switch" aria-checked="false" tabindex="0">
        <span class="knob"></span>
      </div>
      <span class="state">OFF</span>
    </div>

    <div class="switch">
      <span class="name">🚀 The Launch</span>
      <div class="toggle" data-loop="sounds/loop-launch.mp3" role="switch" aria-checked="false" tabindex="0">
        <span class="knob"></span>
      </div>
      <span class="state">OFF</span>
    </div>

    <div class="switch">
      <span class="name">🪩 Sikidim</span>
      <div class="toggle" data-loop="sounds/loop-sikidim.mp3" role="switch" aria-checked="false" tabindex="0">
        <span class="knob"></span>
      </div>
      <span class="state">OFF</span>
    </div>
  </div>

  <div class="volumes">
    <div class="vol">
      <span class="vlabel">🔊 Botones</span>
      <input type="range" id="vol-buttons" min="0" max="100" value="80" />
      <span class="vval" id="vval-buttons">80%</span>
    </div>
    <div class="vol">
      <span class="vlabel">🎚️ Palancas</span>
      <input type="range" id="vol-loops" min="0" max="100" value="60" />
      <span class="vval" id="vval-loops">60%</span>
    </div>
  </div>

  <p class="hint">Tip: mantén presionado un botón más de 2&nbsp;segundos para dejar su meme en loop. Vuelve a tocarlo para quitarlo.</p>

  <script>
    const HOLD_MS = 2000;

    // ----- Botones de meme (tap = 1 disparo, hold >2s = loop) -----
    const buttonAudios = [];

    document.querySelectorAll('.btn[data-sound]').forEach((btn) => {
      const audio = new Audio(btn.dataset.sound);
      audio.preload = 'auto';
      buttonAudios.push(audio);

      let holdTimer = null;
      let longPressed = false;
      let looping = false;

      const startLoop = () => {
        looping = true;
        audio.loop = true;
        audio.currentTime = 0;
        audio.play();
        btn.classList.add('looping');
      };

      const stopLoop = () => {
        looping = false;
        audio.loop = false;
        audio.pause();
        btn.classList.remove('looping');
      };

      const playOnce = () => {
        audio.loop = false;
        audio.currentTime = 0;
        audio.play();
      };

      const onDown = (e) => {
        e.preventDefault();
        longPressed = false;
        btn.classList.add('pressed');
        holdTimer = setTimeout(() => {
          longPressed = true;
          startLoop();
        }, HOLD_MS);
      };

      const onUp = () => {
        clearTimeout(holdTimer);
        btn.classList.remove('pressed');
        if (longPressed) return;          // el loop acaba de arrancar por hold
        if (looping) { stopLoop(); }      // tap mientras loopea => quita
        else { playOnce(); }              // tap normal => 1 disparo
      };

      const onCancel = () => {
        clearTimeout(holdTimer);
        btn.classList.remove('pressed');
      };

      btn.addEventListener('pointerdown', onDown);
      btn.addEventListener('pointerup', onUp);
      btn.addEventListener('pointerleave', onCancel);
      btn.addEventListener('contextmenu', (e) => e.preventDefault());
    });

    // ----- Palancas de loop continuo -----
    const loopAudios = [];

    document.querySelectorAll('.toggle[data-loop]').forEach((toggle) => {
      const audio = new Audio(toggle.dataset.loop);
      audio.loop = true;
      audio.preload = 'auto';
      loopAudios.push(audio);
      const state = toggle.parentElement.querySelector('.state');

      const flip = () => {
        const on = toggle.classList.toggle('on');
        toggle.setAttribute('aria-checked', on ? 'true' : 'false');
        state.textContent = on ? 'ON' : 'OFF';
        if (on) { audio.currentTime = 0; audio.play(); }
        else { audio.pause(); }
      };

      toggle.addEventListener('click', flip);
      toggle.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
      });
    });

    // ----- Controles de volumen -----
    function wireVolume(sliderId, valId, audios) {
      const slider = document.getElementById(sliderId);
      const val = document.getElementById(valId);
      const apply = () => {
        const v = slider.value / 100;
        audios.forEach((a) => { a.volume = v; });
        val.textContent = slider.value + '%';
      };
      slider.addEventListener('input', apply);
      apply(); // valor inicial
    }

    wireVolume('vol-buttons', 'vval-buttons', buttonAudios);
    wireVolume('vol-loops', 'vval-loops', loopAudios);
  </script>
</body>
</html>
